<!DOCTYPE html>
<html>
<head>
    <title>Mock True/False Question</title>
</head>
<body>
    <div class="lrn-matrix">
        <table>
            <thead>
                <tr>
                    <th>Statements</th>
                    <th>True</th>
                    <th>False</th>
                </tr>
            </thead>
            <tbody>
                <tr class="lrn-matrix-row">
                    <td>Row 1: The square of i is -1.</td>
                    <td>
                        <input type="radio" name="q1" id="q1_true" value="true">
                    </td>
                    <td>
                        <input type="radio" name="q1" id="q1_false" value="false">
                    </td>
                </tr>
                <tr class="lrn-matrix-row">
                    <td>Row 2: Complex conjugates are always real.</td>
                    <td>
                        <input type="radio" name="q2" id="q2_true" value="true">
                    </td>
                    <td>
                        <input type="radio" name="q2" id="q2_false" value="false">
                    </td>
                </tr>
                <tr class="lrn-matrix-row">
                    <td>Row 3: Every complex number has a conjugate.</td>
                    <td>
                        <input type="radio" name="q3" id="q3_true" value="true">
                    </td>
                    <td>
                        <input type="radio" name="q3" id="q3_false" value="false">
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
